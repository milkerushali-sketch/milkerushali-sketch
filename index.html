<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Stack Web Developer </title>
    <!-- Fontend links -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact_section.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/certifications.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/project_section.css">
    <link rel="stylesheet" href="css/about_section.css">
</head>
<body>

    <!--  Navbar -->
    <header class="navbar">
        <div class="logo">Vrushali<span>Portfolio</span></div>
        <nav class="nav-links">
            <a href="#home" class="active">Home</a>
            <a href="#about">About & Skills</a>
            <a href="#certifications">Certifications</a>
            <a href="#projects">Projects</a>
            <a href="#contact">Contact</a>
        </nav>
        <div class="menu-toggle" id="mobile-menu">
            <i class="fa-solid fa-bars"></i>
        </div>
    </header>

    <!-- Bio Section  -->
    <section id="home" class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <h3>Hello, I'm</h3>
                <h1>Vrushali Milke</h1>
                <h2>Full Stack Web Developer</h2>
                <p>I build elegant, responsive, and high-performance web applications using modern front-end and back-end ecosystems.</p>
                <div class="hero-btns">
                    <a href="#projects" class="btn primary-btn">View My Work</a>
                    <a href="#contact" class="btn secondary-btn">Let's Talk</a>
                </div>
            </div>
            <!--  Profile SECTION  -->
            <div class="hero-profile">
                <div class="profile-frame">
                    <img src="img\rushi.png" alt="Vrushali's Profile Photo">
                </div>
            </div>
        </div>
    </section>


    <script src="script.js"></script>
<!-- multiple html file connected-->
     <div id="about"></div>
     <div id="certifications"></div>
     <div id="projects"></div>
     <div id="contact"></div>
     <div id="footer"></div>
     
  <script>
    // Load external HTML snippets dynamically
    function loadHTML(id, file) {
      fetch(file)
        .then(response => response.text())
        .then(data => document.getElementById(id).innerHTML = data);
    }

    loadHTML("about", "html/about.html");
    loadHTML("certifications", "html/certifications.html");
    loadHTML("project", "html/project.html");
    loadHTML("contact", "html/contact.html");
    loadHTML("footer", "html/footer.html");
  </script>
</body>
</html>
